## version: '3.8'

services:

  deconz-mqtt-publisher:
    container_name: deconz-mqtt-publisher
    build:
      context: ./deconz_to_mqtt
    depends_on:
      - emqx
    networks:
      - ditto_network
    restart: unless-stopped
    environment:
      - MQTT_BROKER=emqx

  mongo-writer:
    container_name: mongo-writer
    build:
      context: ./mongo_writer
    depends_on:
      - emqx
      - mongodb
    networks:
      - ditto_network
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - MQTT_BROKER=emqx

networks:
  ditto_network:
    external: true






