✅ (a) deconz_to_mqtt.py


import websocket
import json
import paho.mqtt.client as mqtt

MQTT_BROKER = "emqx"
MQTT_PORT = 1883
MQTT_TOPIC_PREFIX = "cps"

DECONZ_WS_URL = "ws://host.docker.internal:8080"

def on_message(ws, message):
    try:
        data = json.loads(message)
        if 'id' in data and 'r' in data and 'state' in data:
            device_id = data['id']
            payload = json.dumps(data)
            topic = f"{MQTT_TOPIC_PREFIX}/{device_id}/state"
            mqtt_client.publish(topic, payload)
            print(f"Published to {topic}: {payload}")
    except Exception as e:
        print("Error handling message:", e)

def on_open(ws):
    print("Connected to deCONZ WebSocket")

def on_error(ws, error):
    print("WebSocket error:", error)

def on_close(ws):
    print("WebSocket closed")

if __name__ == "__main__":
    mqtt_client = mqtt.Client()
    mqtt_client.connect(MQTT_BROKER, MQTT_PORT, 60)
    mqtt_client.loop_start()

    ws = websocket.WebSocketApp(DECONZ_WS_URL,
                                on_message=on_message,
                                on_open=on_open,
                                on_error=on_error,
                                on_close=on_close)
    ws.run_forever()



